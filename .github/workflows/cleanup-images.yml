name: Cleanup Old Container Images

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  PACKAGE_NAME: lilypad

jobs:
  cleanup:
    runs-on: ubuntu-22.04
    steps:
      - name: Delete untagged and stale images
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_PAT }}
        run: |
          echo "Fetching all package versions..."

          deleted=0
          kept=0

          gh api --paginate \
            /users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions \
            --jq '.[]' | jq -c '.' | while read -r version; do

            id=$(echo "$version" | jq -r '.id')
            tags=$(echo "$version" | jq -r '.metadata.container.tags // []')
            tag_count=$(echo "$tags" | jq 'length')
            tag_list=$(echo "$tags" | jq -r 'join(", ")')
            updated=$(echo "$version" | jq -r '.updated_at')

            # Keep versions with protected tags (latest, master, semver)
            if echo "$tags" | jq -e '[.[] | test("^(latest|master|v?[0-9]+\\.[0-9]+)")]| any' > /dev/null 2>&1; then
              echo "Keeping version $id (tags: $tag_list)"
              kept=$((kept + 1))
              continue
            fi

            # Delete untagged versions
            if [ "$tag_count" -eq 0 ]; then
              echo "Deleting untagged version $id (updated: $updated)"
              gh api --method DELETE \
                /users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions/$id \
                2>/dev/null || echo "  Warning: failed to delete version $id"
              deleted=$((deleted + 1))
              sleep 0.3
              continue
            fi

            # Delete PR images older than 1 day
            if echo "$tags" | jq -e '[.[] | test("^pr-[0-9]+$")] | any' > /dev/null 2>&1; then
              age_seconds=$(( $(date +%s) - $(date -d "$updated" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$updated" +%s 2>/dev/null || echo 0) ))
              if [ "$age_seconds" -gt 86400 ]; then
                echo "Deleting stale PR image $id (tags: $tag_list, updated: $updated)"
                gh api --method DELETE \
                  /users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions/$id \
                  2>/dev/null || echo "  Warning: failed to delete version $id"
                deleted=$((deleted + 1))
                sleep 0.3
              else
                echo "Keeping recent PR image $id (tags: $tag_list)"
                kept=$((kept + 1))
              fi
              continue
            fi

            # Delete anything else not matching protected tags
            echo "Deleting version $id (tags: $tag_list)"
            gh api --method DELETE \
              /users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions/$id \
              2>/dev/null || echo "  Warning: failed to delete version $id"
            deleted=$((deleted + 1))
            sleep 0.3
          done

          echo ""
          echo "Cleanup complete!"
